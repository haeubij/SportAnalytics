server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: user-service
    static_configs:
      - targets:
          - localhost
        labels:
          service: user-service
          job: sport-analytics
          __path__: /var/log/user-service/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            traceId: traceId
      - labels:
          level:
          traceId:

  - job_name: auth-service
    static_configs:
      - targets:
          - localhost
        labels:
          service: auth-service
          job: sport-analytics
          __path__: /var/log/auth-service/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            traceId: traceId
      - labels:
          level:
          traceId:

  - job_name: video-service
    static_configs:
      - targets:
          - localhost
        labels:
          service: video-service
          job: sport-analytics
          __path__: /var/log/video-service/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            traceId: traceId
      - labels:
          level:
          traceId:
