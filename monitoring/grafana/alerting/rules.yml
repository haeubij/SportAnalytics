apiVersion: 1

groups:
  - orgId: 1
    name: sport-analytics-alerts
    folder: SportAnalytics
    interval: 1m
    rules:
      - uid: high-error-rate
        title: High Error Rate (>10%)
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: "sum(rate(http_errors_total[5m])) / sum(rate(http_requests_total[5m])) * 100"
              instant: true
              refId: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: "-100"
            model:
              conditions:
                - evaluator:
                    params: [10]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [C]
                  reducer:
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: "-100"
              expression: A
              refId: C
              type: threshold
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Error rate above 10% across all services"

      - uid: high-response-time
        title: High Response Time p95 (>500ms)
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le))"
              instant: true
              refId: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: "-100"
            model:
              conditions:
                - evaluator:
                    params: [0.5]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [C]
                  reducer:
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: "-100"
              expression: A
              refId: C
              type: threshold
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "95th percentile response time above 500ms"
