version: '3.8'

services:
  # ─── User Service ────────────────────────────────────────────────────────────
  user-service:
    build: ./services/user-service
    container_name: user-service
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - MONGODB_URI=mongodb://mongo-users:27017/users
      - JWT_SECRET=f0ad7211d19eab366bd3fce55a7a33e1860ae3f36efe09e30062e7ed10dfae2766c619715d7ceec2130d06c48d1e88c79b3e244d0eccad3dad540a67098ec04a
      - KAFKA_BROKER=kafka:9092
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:4200}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      - mongo-users
      - kafka
    restart: unless-stopped
    volumes:
      - user-service-logs:/app/logs

  # ─── MongoDB for User Service ────────────────────────────────────────────────
  mongo-users:
    image: mongo:7
    container_name: mongo-users
    ports:
      - "27018:27017"
    volumes:
      - mongo-users-data:/data/db
    restart: unless-stopped

  # ─── Zookeeper (required by Kafka) ───────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    restart: unless-stopped

  # ─── Kafka ────────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    restart: unless-stopped

  # ─── Auth Service ─────────────────────────────────────────────────────────────
  auth-service:
    build: ./services/auth-service
    container_name: auth-service
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - MONGODB_URI=mongodb://mongo-auth:27017/auth
      - JWT_SECRET=f0ad7211d19eab366bd3fce55a7a33e1860ae3f36efe09e30062e7ed10dfae2766c619715d7ceec2130d06c48d1e88c79b3e244d0eccad3dad540a67098ec04a
      - JWT_EXPIRES_IN=24h
      - KAFKA_BROKER=kafka:9092
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:4200}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      - mongo-auth
      - kafka
    restart: unless-stopped
    volumes:
      - auth-service-logs:/app/logs

  # ─── MongoDB for Auth Service ─────────────────────────────────────────────────
  mongo-auth:
    image: mongo:7
    container_name: mongo-auth
    ports:
      - "27019:27017"
    volumes:
      - mongo-auth-data:/data/db
    restart: unless-stopped

  # ─── Video Service ────────────────────────────────────────────────────────────
  video-service:
    build: ./services/video-service
    container_name: video-service
    ports:
      - "3003:3003"
    environment:
      - PORT=3003
      - MONGODB_URI=mongodb://mongo-videos:27017/videos
      - JWT_SECRET=f0ad7211d19eab366bd3fce55a7a33e1860ae3f36efe09e30062e7ed10dfae2766c619715d7ceec2130d06c48d1e88c79b3e244d0eccad3dad540a67098ec04a
      - KAFKA_BROKER=kafka:9092
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:4200}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      - mongo-videos
      - kafka
    restart: unless-stopped
    volumes:
      - video-service-logs:/app/logs

  # ─── MongoDB for Video Service ────────────────────────────────────────────────
  mongo-videos:
    image: mongo:7
    container_name: mongo-videos
    ports:
      - "27020:27017"
    volumes:
      - mongo-videos-data:/data/db
    restart: unless-stopped

volumes:
  mongo-users-data:
  mongo-auth-data:
  mongo-videos-data:
  user-service-logs:
  auth-service-logs:
  video-service-logs:
