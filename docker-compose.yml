version: '3.8'

services:
  # ─── User Service ────────────────────────────────────────────────────────────
  user-service:
    build: ./services/user-service
    container_name: user-service
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - MONGODB_URI=mongodb://mongo-users:27017/users
      - JWT_SECRET=f0ad7211d19eab366bd3fce55a7a33e1860ae3f36efe09e30062e7ed10dfae2766c619715d7ceec2130d06c48d1e88c79b3e244d0eccad3dad540a67098ec04a
      - KAFKA_BROKER=kafka:9092
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:4200}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - SERVICE_NAME=user-service
    depends_on:
      - mongo-users
      - kafka
    restart: unless-stopped
    volumes:
      - user-service-logs:/app/logs

  # ─── MongoDB for User Service ────────────────────────────────────────────────
  mongo-users:
    image: mongo:7
    container_name: mongo-users
    ports:
      - "27018:27017"
    volumes:
      - mongo-users-data:/data/db
    restart: unless-stopped

  # ─── Zookeeper (required by Kafka) ───────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    restart: unless-stopped

  # ─── Kafka ────────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    restart: unless-stopped

  # ─── Auth Service ─────────────────────────────────────────────────────────────
  auth-service:
    build: ./services/auth-service
    container_name: auth-service
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - MONGODB_URI=mongodb://mongo-auth:27017/auth
      - JWT_SECRET=f0ad7211d19eab366bd3fce55a7a33e1860ae3f36efe09e30062e7ed10dfae2766c619715d7ceec2130d06c48d1e88c79b3e244d0eccad3dad540a67098ec04a
      - JWT_EXPIRES_IN=24h
      - KAFKA_BROKER=kafka:9092
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:4200}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - SERVICE_NAME=auth-service
    depends_on:
      - mongo-auth
      - kafka
    restart: unless-stopped
    volumes:
      - auth-service-logs:/app/logs

  # ─── MongoDB for Auth Service ─────────────────────────────────────────────────
  mongo-auth:
    image: mongo:7
    container_name: mongo-auth
    ports:
      - "27019:27017"
    volumes:
      - mongo-auth-data:/data/db
    restart: unless-stopped

  # ─── Video Service ────────────────────────────────────────────────────────────
  video-service:
    build: ./services/video-service
    container_name: video-service
    ports:
      - "3003:3003"
    environment:
      - PORT=3003
      - MONGODB_URI=mongodb://mongo-videos:27017/videos
      - JWT_SECRET=f0ad7211d19eab366bd3fce55a7a33e1860ae3f36efe09e30062e7ed10dfae2766c619715d7ceec2130d06c48d1e88c79b3e244d0eccad3dad540a67098ec04a
      - KAFKA_BROKER=kafka:9092
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:4200}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - SERVICE_NAME=video-service
    depends_on:
      - mongo-videos
      - kafka
    restart: unless-stopped
    volumes:
      - video-service-logs:/app/logs

  # ─── MongoDB for Video Service ────────────────────────────────────────────────
  mongo-videos:
    image: mongo:7
    container_name: mongo-videos
    ports:
      - "27020:27017"
    volumes:
      - mongo-videos-data:/data/db
    restart: unless-stopped

  # ─── Loki (Log Aggregation) ───────────────────────────────────────────────────
  loki:
    image: grafana/loki:2.9.0
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yaml
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped

  # ─── Promtail (Log Collector) ─────────────────────────────────────────────────
  promtail:
    image: grafana/promtail:2.9.0
    container_name: promtail
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml
      - user-service-logs:/var/log/user-service:ro
      - auth-service-logs:/var/log/auth-service:ro
      - video-service-logs:/var/log/video-service:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    restart: unless-stopped

  # ─── Prometheus (Metrics Scraper) ─────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    restart: unless-stopped

  # ─── Grafana (Dashboards + Alerting) ─────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: grafana
    ports:
      - "3030:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_ALERTING_ENABLED=true
      - GF_UNIFIED_ALERTING_ENABLED=true
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/alerting:/etc/grafana/provisioning/alerting
    depends_on:
      - loki
      - prometheus
    restart: unless-stopped

volumes:
  mongo-users-data:
  mongo-auth-data:
  mongo-videos-data:
  user-service-logs:
  auth-service-logs:
  video-service-logs:
  loki-data:
  prometheus-data:
  grafana-data:
