name: CI Feature Branch

on:
  push:
    branches:
      - "feature/*"
  pull_request:
    branches:
      - main

env:
  NODE_VERSION: 20

jobs:
  # --------------------
  # LINT
  # --------------------
  lint-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install backend dependencies
        working-directory: backend
        run: npm install
      - name: Lint backend
        working-directory: backend
        run: npm run lint

  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install
      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

  # --------------------
  # TESTS
  # --------------------
  test-backend:
    runs-on: ubuntu-latest
    needs: lint-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install backend dependencies
        working-directory: backend
        run: npm install
      - name: Test backend
        working-directory: backend
        run: npm test

  test-frontend:
    runs-on: ubuntu-latest
    needs: lint-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install
      - name: Test frontend
        working-directory: frontend
        run: npm test

  test-user-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install user-service dependencies
        working-directory: services/user-service
        run: npm install
      - name: Test user-service
        working-directory: services/user-service
        run: npm test

  test-auth-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install auth-service dependencies
        working-directory: services/auth-service
        run: npm install
      - name: Test auth-service
        working-directory: services/auth-service
        run: npm test

  test-video-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install video-service dependencies
        working-directory: services/video-service
        run: npm install
      - name: Test video-service
        working-directory: services/video-service
        run: npm test

  # --------------------
  # BUILD (Verification only)
  # --------------------
  build-frontend:
    runs-on: ubuntu-latest
    needs: test-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install
      - name: Build frontend
        working-directory: frontend
        run: npm run build
