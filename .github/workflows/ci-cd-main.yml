name: CI/CD Main

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

env:
  NODE_VERSION: 20
  REGISTRY: ghcr.io
  IMAGE_NAME: sport-analytics-backend

jobs:
  # =====================================================
  # 1) VERSION + TAG
  # =====================================================
  versioning:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: version
        run: |
          LAST_TAG=$(git tag --sort=-v:refname | head -n 1)
          if [ -z "$LAST_TAG" ]; then
            VERSION="1.0.0"
          else
            BASE=${LAST_TAG#v}
            IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE"
            VERSION="$MAJOR.$MINOR.$((PATCH+1))"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Git Tag
        run: |
          git tag v${{ steps.version.outputs.version }}
          git push origin v${{ steps.version.outputs.version }}

  # =====================================================
  # 2) LINT
  # =====================================================
  lint-backend:
    needs: versioning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - working-directory: backend
        run: npm ci
      - working-directory: backend
        run: npm run lint

  lint-frontend:
    needs: versioning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - working-directory: frontend
        run: npm ci
      - working-directory: frontend
        run: npm run lint

  # =====================================================
  # 3) TESTS
  # =====================================================
  test-backend:
    needs: lint-backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - working-directory: backend
        run: npm ci
      - working-directory: backend
        run: npm test

  test-frontend:
    needs: lint-frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - working-directory: frontend
        run: npm ci
      - working-directory: frontend
        run: npm test

  # =====================================================
  # 4) FRONTEND BUILD + ARTIFACT
  # =====================================================
  build-frontend:
    needs:
      - versioning
      - test-frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - working-directory: frontend
        run: npm ci
      - working-directory: frontend
        run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-${{ needs.versioning.outputs.version }}
          path: frontend/dist

  # =====================================================
  # 5) BACKEND DOCKER + GHCR
  # =====================================================
  docker-backend:
    needs:
      - versioning
      - test-backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io \
            -u "${{ secrets.GHCR_USERNAME }}" --password-stdin

      - name: Build Docker Image
        working-directory: backend
        run: |
          docker build \
            -t ghcr.io/${{ secrets.GHCR_USERNAME }}/${{ env.IMAGE_NAME }}:${{ needs.versioning.outputs.version }} \
            -t ghcr.io/${{ secrets.GHCR_USERNAME }}/${{ env.IMAGE_NAME }}:latest \
            .

      - name: Push Docker Image
        run: |
          docker push ghcr.io/${{ secrets.GHCR_USERNAME }}/${{ env.IMAGE_NAME }}:${{ needs.versioning.outputs.version }}
          docker push ghcr.io/${{ secrets.GHCR_USERNAME }}/${{ env.IMAGE_NAME }}:latest
