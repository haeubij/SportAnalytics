name: CI/CD Main

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

env:
  NODE_VERSION: 20
  REGISTRY: ghcr.io
  IMAGE_NAME: sport-analytics-backend

jobs:
  # =====================================================
  # 1) AUTO TAG – läuft NUR bei main (nicht bei Tags)
  # =====================================================
  auto-tag:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate next SemVer version
        id: version
        run: |
          LAST_TAG=$(git tag --sort=-v:refname | head -n 1)
          if [ -z "$LAST_TAG" ]; then
            NEW_VERSION="1.0.0"
          else
            VERSION=${LAST_TAG#v}
            IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
            PATCH=$((PATCH+1))
            NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          fi
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Create and push git tag
        run: |
          git tag v${{ steps.version.outputs.version }}
          git push origin v${{ steps.version.outputs.version }}

  # =====================================================
  # 2) LINT
  # =====================================================
  lint-backend:
    runs-on: ubuntu-latest
    needs: auto-tag
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - working-directory: backend
        run: npm install
      - working-directory: backend
        run: npm run lint

  lint-frontend:
    runs-on: ubuntu-latest
    needs: auto-tag
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - working-directory: frontend
        run: npm install
      - working-directory: frontend
        run: npm run lint

  # =====================================================
  # 3) TESTS
  # =====================================================
  test-backend:
    runs-on: ubuntu-latest
    needs: lint-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - working-directory: backend
        run: npm install
      - working-directory: backend
        run: npm test

  test-frontend:
    runs-on: ubuntu-latest
    needs: lint-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - working-directory: frontend
        run: npm install
      - working-directory: frontend
        run: npm test

  # =====================================================
  # 4) FRONTEND BUILD + ARTIFACT (NUR BEI TAG)
  # =====================================================
  build-frontend:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs:
      - test-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - working-directory: frontend
        run: npm install
      - working-directory: frontend
        run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-build-${{ github.ref_name }}
          path: frontend/dist

  # =====================================================
  # 5) BACKEND DOCKER IMAGE (NUR BEI TAG)
  # =====================================================
  docker-backend:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs:
      - test-backend
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        run: |
          echo ${{ secrets.GHCR_TOKEN }} | docker login ghcr.io \
            -u ${{ secrets.GHCR_USERNAME }} --password-stdin

      - name: Build Docker image
        working-directory: backend
        run: |
          docker build \
            -t ghcr.io/${{ secrets.GHCR_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }} \
            -t ghcr.io/${{ secrets.GHCR_USERNAME }}/${{ env.IMAGE_NAME }}:latest \
            .

      - name: Push Docker image
        run: |
          docker push ghcr.io/${{ secrets.GHCR_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
          docker push ghcr.io/${{ secrets.GHCR_USERNAME }}/${{ env.IMAGE_NAME }}:latest
