name: CI/CD Main

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"

env:
  NODE_VERSION: 20
  REGISTRY: ghcr.io
  IMAGE_NAME: sport-analytics-backend

jobs:
  prepare-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: version
        run: |
          VERSION=$(git describe --tags --abbrev=0 | sed 's/^v//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  lint-backend:
    runs-on: ubuntu-latest
    needs: prepare-version
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - working-directory: backend
        run: npm install
      - working-directory: backend
        run: npm run lint

  lint-frontend:
    runs-on: ubuntu-latest
    needs: prepare-version
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - working-directory: frontend
        run: npm install
      - working-directory: frontend
        run: npm run lint

  test-backend:
    runs-on: ubuntu-latest
    needs: lint-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - working-directory: backend
        run: npm install
      - working-directory: backend
        run: npm test

  test-frontend:
    runs-on: ubuntu-latest
    needs: lint-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - working-directory: frontend
        run: npm install
      - working-directory: frontend
        run: npm test

  build-frontend:
    runs-on: ubuntu-latest
    needs: test-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - working-directory: frontend
        run: npm install
      - working-directory: frontend
        run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-build-${{ needs.prepare-version.outputs.version }}
          path: frontend/dist

  docker-backend:
    runs-on: ubuntu-latest
    needs:
      - prepare-version
      - test-backend
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        run: |
          echo ${{ secrets.GHCR_TOKEN }} | docker login ${{ env.REGISTRY }} -u ${{ secrets.GHCR_USERNAME }} --password-stdin

      - name: Build Docker image
        working-directory: backend
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ secrets.GHCR_USERNAME }}/${{ env.IMAGE_NAME }}:${{ needs.prepare-version.outputs.version }} \
            -t ${{ env.REGISTRY }}/${{ secrets.GHCR_USERNAME }}/${{ env.IMAGE_NAME }}:latest \
            .

      - name: Push Docker image
        run: |
          docker push ${{ env.REGISTRY }}/${{ secrets.GHCR_USERNAME }}/${{ env.IMAGE_NAME }}:${{ needs.prepare-version.outputs.version }}
          docker push ${{ env.REGISTRY }}/${{ secrets.GHCR_USERNAME }}/${{ env.IMAGE_NAME }}:latest
